  <rect x="40" y="258" width="600" height="56" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
  <text x="648" y="288" text-anchor="end" font-size="12" fill="#aaa">L3 / IP</text>

  <rect x="40" y="330" width="600" height="56" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
  <text x="648" y="360" text-anchor="end" font-size="12" fill="#aaa">L4 / Transport</text>

  <rect x="40" y="402" width="600" height="56" rx="6" fill="#f5f5f5" stroke="#ddd" stroke-width="0.5"/>
