  <text x="470" y="286" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489" dominant-baseline="central">IP route lookup + frag</text>

  <rect x="360" y="196" width="220" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="470" y="214" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489" dominant-baseline="central">POSTROUTING + tc egress</text>

  <rect x="360" y="124" width="220" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="470" y="142" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489" dominant-baseline="central">Driver: TX ring → DMA</text>

  <rect x="360" y="52" width="220" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="470" y="70" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489" dominant-baseline="central">NIC transmits frame</text>

  <!-- EGRESS arrows (upward) -->
  <line x1="470" y1="482" x2="470" y2="450" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="410" x2="470" y2="378" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="338" x2="470" y2="306" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="304" x2="470" y2="234" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="232" x2="470" y2="162" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="160" x2="470" y2="90" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

