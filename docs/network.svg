  <rect x="60" y="124" width="220" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="170" y="142" text-anchor="middle" font-size="13" font-weight="500" fill="#085041" dominant-baseline="central">Driver: NAPI poll → sk_buff</text>

  <rect x="60" y="196" width="220" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="170" y="214" text-anchor="middle" font-size="13" font-weight="500" fill="#085041" dominant-baseline="central">tc ingress + PREROUTING</text>

  <rect x="60" y="268" width="220" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="170" y="286" text-anchor="middle" font-size="13" font-weight="500" fill="#085041" dominant-baseline="central">IP routing decision</text>

